name: Build Windows

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install PySide6
          pip install python-mpv

      - name: Build
        run: |
          pyinstaller --name Rify --windowed ^
          --add-data "mpv;mpv" ^
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rify-Windows
          path: dist/Rify