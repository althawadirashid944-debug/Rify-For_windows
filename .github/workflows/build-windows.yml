name: Build Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install PySide6
          pip install yt-dlp
          pip install python-mpv
          pip install mutagen
          pip install rapidfuzz

      - name: Extract mpv
        shell: pwsh
        run: |
          7z x Assets/mpv/mpv.7z -oAssets/mpv/extracted

      - name: Build
        shell: pwsh
        run: |
          pyinstaller `
            --name Rify `
            --windowed `
            --collect-all PySide6 `
            --collect-all mutagen `
            --collect-all rapidfuzz `
            --hidden-import yt_dlp `
            --hidden-import mpv `
            --add-data "Assets/mpv/extracted;mpv" `
            main.py

      - name: Verify build
        shell: pwsh
        run: |
          Get-ChildItem dist/Rify

      - name: Zip build
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Rify/* -DestinationPath Rify-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rify-Windows
          path: Rify-Windows.zip 